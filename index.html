<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>语音面板</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --panel: #161616;
      --border: #2a2a2a;
      --accent: #e8ff47;
      --accent2: #ff6b35;
      --text: #f0f0f0;
      --muted: #555;
      --playing: #e8ff47;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Sans SC', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px 60px;
    }

    header {
      text-align: center;
      margin-bottom: 48px;
    }

    header .label {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      letter-spacing: 4px;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    header h1 {
      font-size: 36px;
      font-weight: 700;
      letter-spacing: -1px;
      color: var(--text);
    }

    header h1 span {
      color: var(--accent);
    }

    .tip {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      margin-top: 10px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px;
      width: 100%;
      max-width: 860px;
    }

    .sound-btn {
      position: relative;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 24px 20px 20px;
      cursor: pointer;
      text-align: left;
      transition: border-color 0.15s, transform 0.1s, background 0.15s;
      overflow: hidden;
      user-select: none;
    }

    .sound-btn:hover {
      border-color: var(--accent);
      background: #1c1c1c;
      transform: translateY(-2px);
    }

    .sound-btn.playing {
      border-color: var(--accent);
      background: #1c1f00;
    }

    .sound-btn.playing::after {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--accent);
      opacity: 0.04;
    }

    .btn-number {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 12px;
      display: block;
    }

    .btn-name {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 4px;
      line-height: 1.3;
    }

    .btn-file {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      word-break: break-all;
    }

    .play-indicator {
      position: absolute;
      top: 20px;
      right: 18px;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--muted);
      transition: background 0.2s;
    }

    .sound-btn.playing .play-indicator {
      background: var(--accent);
      box-shadow: 0 0 10px var(--accent);
      animation: pulse 0.8s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .progress-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      height: 2px;
      background: var(--accent);
      width: 0%;
      transition: width 0.1s linear;
    }

    .no-file {
      opacity: 0.35;
      cursor: not-allowed;
    }
    .no-file:hover {
      transform: none;
      border-color: var(--border);
      background: var(--panel);
    }

    .instructions {
      margin-top: 52px;
      max-width: 860px;
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 24px 28px;
      background: var(--panel);
    }

    .instructions h2 {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 16px;
    }

    .instructions ol {
      padding-left: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .instructions li {
      font-size: 13px;
      color: #aaa;
      line-height: 1.7;
    }

    code {
      font-family: 'Space Mono', monospace;
      background: #222;
      border: 1px solid #333;
      padding: 1px 6px;
      border-radius: 3px;
      font-size: 12px;
      color: var(--accent);
    }
  </style>
</head>
<body>

<header>
  <p class="label">Audio Soundboard</p>
  <h1>语音<span>面板</span></h1>
  <p class="tip">点击按钮播放对应语音</p>
</header>

<div class="grid" id="grid"></div>

<script>
  // ✏️ 在这里配置你的语音 —— 修改 name 和 file 即可
  const sounds = [
    { name: "我要验牌",        file: "Poker/Woyaoyanpai.mp3" },
    { name: "牌没有问题",        file: "Poker/Noproblem.mp3" },
    { name: "给我擦皮鞋",          file: "Poker/Capixie.mp3" },
    { name: "小儿科",      file: "Poker/Xiaoerke.mp3" },
  ];

  // ——— 以下无需修改 ———
  const grid = document.getElementById('grid');
  let currentAudio = null;
  let currentBtn = null;
  let rafId = null;

  sounds.forEach((s, i) => {
    const audio = new Audio(s.file);
    const btn = document.createElement('div');
    btn.className = 'sound-btn';
    btn.innerHTML = `
      <span class="btn-number">${String(i + 1).padStart(2, '0')}</span>
      <div class="btn-name">${s.name}</div>
      <div class="btn-file">${s.file}</div>
      <div class="play-indicator"></div>
      <div class="progress-bar"></div>
    `;

    const bar = btn.querySelector('.progress-bar');

    function updateProgress() {
      if (audio.duration) {
        bar.style.width = (audio.currentTime / audio.duration * 100) + '%';
      }
      if (!audio.paused) rafId = requestAnimationFrame(updateProgress);
    }

    function stopCurrent() {
      if (currentAudio && currentAudio !== audio) {
        currentAudio.pause();
        currentAudio.currentTime = 0;
        currentBtn.classList.remove('playing');
        currentBtn.querySelector('.progress-bar').style.width = '0%';
      }
      if (rafId) cancelAnimationFrame(rafId);
    }

    btn.addEventListener('click', () => {
      if (btn.classList.contains('no-file')) return;

      if (btn.classList.contains('playing')) {
        // 正在播放 → 点击停止
        audio.pause();
        audio.currentTime = 0;
        btn.classList.remove('playing');
        bar.style.width = '0%';
        cancelAnimationFrame(rafId);
        currentAudio = null;
        currentBtn = null;
        return;
      }

      // 停掉当前正在播放的其他按钮
      stopCurrent();

      // 每次重新从头播放
      audio.currentTime = 0;
      audio.play().catch(() => {
        btn.classList.add('no-file');
        btn.querySelector('.btn-file').textContent = '⚠ 文件未找到：' + s.file;
      });
      btn.classList.add('playing');
      currentAudio = audio;
      currentBtn = btn;
      rafId = requestAnimationFrame(updateProgress);
    });

    audio.addEventListener('ended', () => {
      btn.classList.remove('playing');
      bar.style.width = '0%';
      cancelAnimationFrame(rafId);
      currentAudio = null;
      currentBtn = null;
    });

    grid.appendChild(btn);
  });
</script>
</body>
</html>
